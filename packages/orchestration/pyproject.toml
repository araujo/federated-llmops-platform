[project]
name = "llmops-orchestration"
version = "0.1.0"
description = "Orchestration layer for Federated LLMOps Platform"
requires-python = ">=3.11"
dependencies = [
    "langchain>=0.3.0",
    "langchain-openai>=0.2.0",
    "langfuse>=2.0.0",
    "llmops-prompts",
    "llmops-retrieval",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["orchestration"]
