[project]
name = "llmops-prompts"
version = "0.1.0"
description = "Reusable prompt management package for Federated LLMOps Platform"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
mongodb = ["pymongo>=4.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["prompts"]

[tool.hatch.build.targets.sdist]
include = ["prompts/templates"]
