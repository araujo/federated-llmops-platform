[project]
name = "llmops-retrieval"
version = "0.1.0"
description = "Retrieval package for Federated LLMOps Platform"
requires-python = ">=3.11"
dependencies = [
    "asyncpg>=0.29.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["retrieval"]
