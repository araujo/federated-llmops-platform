[project]
name = "llmops-tools"
version = "0.1.0"
description = "Tools package for Federated LLMOps Platform"
requires-python = ">=3.11"
dependencies = [
    "llmops-retrieval",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tools"]
