name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: llmops
          POSTGRES_PASSWORD: llmops
          POSTGRES_DB: llmops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U llmops -d llmops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Init database schema
        env:
          PGPASSWORD: llmops
        run: |
          for i in $(seq 1 30); do
            psql -h localhost -U llmops -d llmops -c "SELECT 1" 2>/dev/null && break
            sleep 1
          done
          psql -h localhost -U llmops -d llmops -f infrastructure/postgres/init.sql

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/prompts
          pip install -e packages/retrieval
          pip install -e packages/tools
          pip install -e packages/orchestration
          pip install -e "apps/api[dev]"

      - name: Run tests
        env:
          MONGODB_URI: memory://
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: llmops
          POSTGRES_PASSWORD: llmops
          POSTGRES_DB: llmops
          MINIO_HOST: localhost
          MINIO_PORT: 9000
          LITELLM_BASE_URL: http://localhost:4000/v1
          LANGFUSE_HOST: http://localhost:3000
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest apps/api/tests/ -v --tb=short
