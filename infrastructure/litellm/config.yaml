# LiteLLM Proxy - MVP config
# Chat: ollama/llama3.2
# Embedding: ollama/nomic-embed-text
# All model calls route through LiteLLM; no direct Ollama from app

litellm_settings:
  drop_params: true  # Ollama does not support encoding_format=base64 from OpenAI client

model_list:
  # Chat model for RAG generation
  - model_name: ollama/llama3.2
    litellm_params:
      model: ollama/llama3.2
      api_base: http://ollama:11434

  # Embedding model for vector search
  - model_name: ollama/nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434
      drop_params: true

general_settings:
  master_key: sk-1234
